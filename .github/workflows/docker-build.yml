name: End-2-End-Project

on:
  push:
    branches:
      - main
      - dev

jobs:

  # 🔍 SonarQube Scan (Code Quality)
  sonar-scan:
    name: SonarQube Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=sagarbindu_End-2-End-Project
            -Dsonar.organization=sagarbindu
            -Dsonar.sources=.
            -Dsonar.host.url=https://sonarcloud.io
      
      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  # 🏗 Build job
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: sonar-scan

    steps:
      - name: Checkout App Repo
        uses: actions/checkout@v3

  # 📦 Push Docker Image
  push:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image (Local)
        run: |
          docker build -t sagar456/devops-app:${{ github.run_number }} .

      # 🔐 Trivy Scan BEFORE push (best practice)
      - name: Scan Docker Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: sagar456/devops-app:${{ github.run_number }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Push Docker Image
        run: |
          docker push sagar456/devops-app:${{ github.run_number }}

  # 🚀 DEV Deployment (Auto)
  update-dev:
    name: Update Dev Helm
    runs-on: ubuntu-latest
    needs: push
    if: github.ref_name == 'dev'

    steps:
      - name: Clone GitOps Repo
        run: git clone https://github.com/sagarbindu/End-2-end-gitops.git

      - name: Update Dev Values
        run: |
          cd End-2-end-gitops
          echo "Updating values-dev.yaml with tag ${{ github.run_number }}"
          sed -i "s/tag:.*/tag: \"${{ github.run_number }}\"/" values-dev.yaml

      - name: Push changes
        run: |
          cd End-2-end-gitops
          git config user.name "sagarbindu"
          git config user.email "dashsagarbindu789@gmail.com"
          git add .
          git commit -m "Dev: update image tag to ${{ github.run_number }}"
          git push https://${{ secrets.GIT_TOKEN }}@github.com/sagarbindu/End-2-end-gitops.git

  # 🔒 PROD Deployment (Manual Approval)
  update-prod:
    name: Update Prod Helm
    runs-on: ubuntu-latest
    needs: push
    if: github.ref_name == 'main'

    environment: prod  

    steps:
      - name: Clone GitOps Repo
        run: git clone https://github.com/sagarbindu/End-2-end-gitops.git

      - name: Update Prod Values
        run: |
          cd End-2-end-gitops
          echo "Updating values-prod.yaml with tag ${{ github.run_number }}"
          sed -i "s/tag:.*/tag: \"${{ github.run_number }}\"/" values-prod.yaml

      - name: Push changes
        run: |
          cd End-2-end-gitops
          git config user.name "sagarbindu"
          git config user.email "dashsagarbindu789@gmail.com"
          git add .
          git commit -m "Prod: update image tag to ${{ github.run_number }}"
          git push https://${{ secrets.GIT_TOKEN }}@github.com/sagarbindu/End-2-end-gitops.git
