name: End-2-End-Project

on:
  push:
    branches:
      - main

jobs:

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout App Repo
        uses: actions/checkout@v3
        
  push:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: sagar456/devops-app:${{ github.run_number }}

  update-gitops:
    name: Update Helm Chart
    runs-on: ubuntu-latest
    needs: push
    steps:
      #  Clone GitOps repo
      - name: Clone GitOps Repo
        run: |
          git clone https://github.com/sagarbindu/End-2-end-gitops.git

      #  Update Helm values.yaml
      - name: Update Image Tag
        run: |
          cd End-2-end-gitops
          sed -i 's/tag:.*/tag: "${{ github.run_number }}"/' values.yaml

      #  Commit and push
      - name: Push changes
        run: |
          cd End-2-end-gitops
          git config user.name "sagarbindu"
          git config user.email "dashsagarbindu789@gmail.com"
          git add .
          git commit -m "Update image tag to ${{ github.run_number }}"
          git push https://${{ secrets.GIT_TOKEN }}@github.com/sagarbindu/End-2-end-gitops.git
