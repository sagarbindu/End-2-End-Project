name: End-2-End-Project

on:
  push:
    branches:
      - dev*
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Enter image tag to deploy (SHA)"
        required: false

jobs:

  # 🏗 Build + Push Docker Image
  build-and-push:
    runs-on: ubuntu-latest
    if: startsWith(github.ref_name, 'dev')

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 🔥 Build + capture logs
      - name: Build Docker Image
        run: |
          set -o pipefail
          docker build -t sagar456/devops-app:${{ github.sha }} . 2>&1 | tee -a pipeline.log
          docker tag sagar456/devops-app:${{ github.sha }} sagar456/devops-app:latest 2>&1 | tee -a pipeline.log

      # 🔥 Push + capture logs
      - name: Push Docker Image
        run: |
          set -o pipefail
          docker push sagar456/devops-app:${{ github.sha }} 2>&1 | tee -a pipeline.log
          docker push sagar456/devops-app:latest 2>&1 | tee -a pipeline.log

      - name: Trigger Render Deployment
        run: |
          set -o pipefail
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }} 2>&1 | tee -a pipeline.log

      - name: AI Failure Analyzer (Gemini)
        if: failure()
        run: |
          LOGS=$(tail -n 50 pipeline.log)

          curl -s \
            -H "Content-Type: application/json" \
            -X POST \
            "https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=${{ secrets.GEMINI_API_KEY }}" \
            -d "{
              \"contents\": [{
                \"parts\": [{
                  \"text\": \"Analyze this CI/CD failure and suggest fix:\n\n$LOGS\"
                }]
              }]
            }"

  # 🚀 DEV Deployment
  update-dev:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: startsWith(github.ref_name, 'dev')

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Clone GitOps Repo
        run: git clone https://github.com/sagarbindu/End-2-end-gitops.git 2>&1 | tee -a pipeline.log

      - name: Update Dev Values
        run: |
          cd End-2-end-gitops

          FILE=values-dev.yaml

          OLD_TAG=$(grep 'tag:' $FILE | head -1 | awk '{print $2}' | tr -d '"')

          echo "Old tag: $OLD_TAG"

          # update previousTag
          if grep -q "previousTag" $FILE; then
            sed -i "s/previousTag:.*/previousTag: \"$OLD_TAG\"/" $FILE
          else
            echo "previousTag: \"$OLD_TAG\"" >> $FILE
          fi

          # update new tag
          sed -i "s/tag:.*/tag: \"${{ github.sha }}\"/" $FILE

      - name: Push changes
        run: |
          cd End-2-end-gitops

          git config user.name "sagarbindu"
          git config user.email "dashsagarbindu789@gmail.com"

          git add .
          git commit -m "Dev: update image tag to ${{ github.sha }}" || echo "No changes"
          git push https://${{ secrets.GIT_TOKEN }}@github.com/sagarbindu/End-2-end-gitops.git


  # 🔒 PROD Deployment
  update-prod:
    runs-on: ubuntu-latest
    if: github.ref_name == 'main' && github.event_name == 'workflow_dispatch'

    environment: prod

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Clone GitOps Repo
        run: git clone https://github.com/sagarbindu/End-2-end-gitops.git 2>&1 | tee -a pipeline.log

      - name: Update Prod Values
        run: |
          cd End-2-end-gitops

          FILE=values-prod.yaml
          TAG="${{ github.event.inputs.image_tag }}"

          if [ -z "$TAG" ]; then
            echo "Image tag required!"
            exit 1
          fi

          OLD_TAG=$(grep 'tag:' $FILE | head -1 | awk '{print $2}' | tr -d '"')

          # update previousTag
          if grep -q "previousTag" $FILE; then
            sed -i "s/previousTag:.*/previousTag: \"$OLD_TAG\"/" $FILE
          else
            echo "previousTag: \"$OLD_TAG\"" >> $FILE
          fi

          # update new tag
          sed -i "s/tag:.*/tag: \"$TAG\"/" $FILE

      - name: Push changes
        run: |
          cd End-2-end-gitops

          git config user.name "sagarbindu"
          git config user.email "dashsagarbindu789@gmail.com"

          git add .
          git commit -m "Prod: deploy image ${{ github.event.inputs.image_tag }}"
          git push https://${{ secrets.GIT_TOKEN }}@github.com/sagarbindu/End-2-end-gitops.git