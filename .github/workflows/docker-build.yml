name: End-2-End-Project

on:
  push:
    branches:
      - main
      - dev

jobs:

  #  Build job
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout App Repo
        uses: actions/checkout@v3

  #  Push Docker Image
  push:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: sagar456/devops-app:${{ github.run_number }}

  #  DEV Deployment (Auto)
  update-dev:
    name: Update Dev Helm
    runs-on: ubuntu-latest
    needs: push
    if: github.ref_name == 'dev'

    steps:
      - name: Clone GitOps Repo
        run: git clone https://github.com/sagarbindu/End-2-end-gitops.git

      - name: Update Dev Values
        run: |
          cd End-2-end-gitops
          echo "Updating values-dev.yaml with tag ${{ github.run_number }}"
          sed -i "s/tag:.*/tag: \"${{ github.run_number }}\"/" values-dev.yaml

      - name: Push changes
        run: |
          cd End-2-end-gitops
          git config user.name "sagarbindu"
          git config user.email "dashsagarbindu789@gmail.com"
          git add .
          git commit -m "Dev: update image tag to ${{ github.run_number }}"
          git push https://${{ secrets.GIT_TOKEN }}@github.com/sagarbindu/End-2-end-gitops.git

  #  PROD Deployment (With Approval)
  update-prod:
    name: Update Prod Helm
    runs-on: ubuntu-latest
    needs: push
    if: github.ref_name == 'main'

    environment: prod  

    steps:
      - name: Clone GitOps Repo
        run: git clone https://github.com/sagarbindu/End-2-end-gitops.git

      - name: Update Prod Values
        run: |
          cd End-2-end-gitops
          echo "Updating values-prod.yaml with tag ${{ github.run_number }}"
          sed -i "s/tag:.*/tag: \"${{ github.run_number }}\"/" values-prod.yaml

      - name: Push changes
        run: |
          cd End-2-end-gitops
          git config user.name "sagarbindu"
          git config user.email "dashsagarbindu789@gmail.com"
          git add .
          git commit -m "Prod: update image tag to ${{ github.run_number }}"
          git push https://${{ secrets.GIT_TOKEN }}@github.com/sagarbindu/End-2-end-gitops.git
