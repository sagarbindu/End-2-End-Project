name: End-2-End-Project

on:
  push:
    branches:
      - main
      - dev

jobs:

  # 🏗 Build + Push Docker Image
  build-and-push:
    name: Build and Push Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # 🔐 Docker Login
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 🏗 Build Image with Better Tagging
      - name: Build Docker Image
        run: |
          docker build -t sagar456/devops-app:${{ github.sha }} .
          docker tag sagar456/devops-app:${{ github.sha }} sagar456/devops-app:latest

      # 🔍 Trivy Scan (Security)
      # - name: Scan Docker Image with Trivy
      #   uses: aquasecurity/trivy-action@master
      #   with:
      #     image-ref: sagar456/devops-app:${{ github.sha }}
      #     format: table
      #     exit-code: '1'
      #     ignore-unfixed: true
      #     severity: CRITICAL,HIGH

      # 📦 Push Image
      - name: Push Docker Image
        run: |
          docker push sagar456/devops-app:${{ github.sha }}
          docker push sagar456/devops-app:latest

  # 🚀 DEV Deployment (Auto)
  update-dev:
    name: Update Dev Helm
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref_name == 'dev'

    steps:
      - name: Clone GitOps Repo
        run: git clone https://github.com/sagarbindu/End-2-end-gitops.git

      - name: Update Dev Values
        run: |
          cd End-2-end-gitops
          echo "Updating values-dev.yaml with tag ${{ github.sha }}"
          sed -i "s/tag:.*/tag: \"${{ github.sha }}\"/" values-dev.yaml

      - name: Push changes
        run: |
          cd End-2-end-gitops
          git config user.name "sagarbindu"
          git config user.email "dashsagarbindu789@gmail.com"
          git add .
          git commit -m "Dev: update image tag to ${{ github.sha }}" || echo "No changes to commit"
          git push https://${{ secrets.GIT_TOKEN }}@github.com/sagarbindu/End-2-end-gitops.git

  # 🔒 PROD Deployment (Manual Approval)
  update-prod:
    name: Update Prod Helm
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref_name == 'main'

    environment: prod

    steps:
      - name: Clone GitOps Repo
        run: git clone https://github.com/sagarbindu/End-2-end-gitops.git

      - name: Update Prod Values
        run: |
          cd End-2-end-gitops
          echo "Updating values-prod.yaml with tag ${{ github.sha }}"
          sed -i "s/tag:.*/tag: \"${{ github.sha }}\"/" values-prod.yaml

      - name: Push changes
        run: |
          cd End-2-end-gitops
          git config user.name "sagarbindu"
          git config user.email "dashsagarbindu789@gmail.com"
          git add .
          git commit -m "Prod: update image tag to ${{ github.sha }}" || echo "No changes to commit"
          git push https://${{ secrets.GIT_TOKEN }}@github.com/sagarbindu/End-2-end-gitops.git