name: End-2-End-Project

on:
  push:
    branches:
      - dev*
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Enter image tag to deploy (only for PROD)"
        required: false

jobs:

  # 🏗 Build + Push Docker Image
  build-and-push:
    name: Build and Push Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # 🔐 Docker Login
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 🏗 Build Image
      - name: Build Docker Image
        run: |
          docker build -t sagar456/devops-app:${{ github.sha }} .
          docker tag sagar456/devops-app:${{ github.sha }} sagar456/devops-app:latest

      # 📦 Push Image
      - name: Push Docker Image
        run: |
          docker push sagar456/devops-app:${{ github.sha }}
          docker push sagar456/devops-app:latest

      # 🚀 Trigger Render Deployment
      - name: Trigger Render Deployment
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}

  # 🚀 DEV Deployment (Auto)
  update-dev:
    name: Update Dev Helm
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref_name == 'dev'

    steps:
      - name: Clone GitOps Repo
        run: git clone https://github.com/sagarbindu/End-2-end-gitops.git

      - name: Update Dev Values
        run: |
          cd End-2-end-gitops
          sed -i "s/tag:.*/tag: \"${{ github.sha }}\"/" values-dev.yaml

      - name: Push changes
        run: |
          cd End-2-end-gitops
          git config user.name "sagarbindu"
          git config user.email "dashsagarbindu789@gmail.com"
          git add .
          git commit -m "Dev: update image tag to ${{ github.sha }}" || echo "No changes"
          git push https://${{ secrets.GIT_TOKEN }}@github.com/sagarbindu/End-2-end-gitops.git

  # 🔒 PROD Deployment (Manual + Controlled)
  update-prod:
    name: Update Prod Helm
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref_name == 'main' && github.event_name == 'workflow_dispatch'

    environment: prod

    steps:
      - name: Clone GitOps Repo
        run: git clone https://github.com/sagarbindu/End-2-end-gitops.git

      - name: Update Prod Values
        run: |
          cd End-2-end-gitops
          sed -i "s/tag:.*/tag: \"${{ github.event.inputs.image_tag }}\"/" values-prod.yaml

      - name: Push changes
        run: |
          cd End-2-end-gitops
          git config user.name "sagarbindu"
          git config user.email "dashsagarbindu789@gmail.com"
          git add .
          git commit -m "Prod: deploy image ${{ github.event.inputs.image_tag }}"
          git push https://${{ secrets.GIT_TOKEN }}@github.com/sagarbindu/End-2-end-gitops.git